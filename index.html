<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1f2937" />
  <title>卡片式学习</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    html, body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    .fade-enter {
      opacity: 0;
      transform: translateY(8px);
    }
    .fade-active {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .answer-hidden {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 300ms ease, opacity 260ms ease, margin-top 260ms ease;
      margin-top: 0;
    }
    .answer-shown {
      max-height: 60vh;
      opacity: 1;
      margin-top: 1.25rem;
      transition: max-height 300ms ease, opacity 300ms ease, margin-top 260ms ease;
      overflow-y: auto;
    }

    .card-press:active {
      transform: scale(0.99);
      transition: transform 120ms ease;
    }

    .toast-in {
      animation: toastIn 200ms ease forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, -8px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
  </style>
</head>

<body class="min-h-screen bg-gray-100 text-gray-800 font-sans">

  <!-- 顶部栏 -->
  <header class="fixed top-0 left-0 right-0 z-20 bg-white/80 backdrop-blur border-b border-gray-200">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-graduation-cap text-indigo-600 text-lg"></i>
        <h1 class="text-lg font-semibold text-gray-800">卡片学习</h1>
      </div>

      <!-- 只看收藏 Toggle -->
      <label class="flex items-center gap-2 select-none cursor-pointer">
        <span id="favToggleLabel" class="text-sm text-gray-600">只看收藏</span>
        <span class="relative inline-block">
          <input id="favToggle" type="checkbox" class="peer sr-only" />
          <span class="block w-11 h-6 rounded-full bg-gray-300 peer-checked:bg-indigo-500 transition-colors"></span>
          <span class="absolute left-0.5 top-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform peer-checked:translate-x-5"></span>
        </span>
      </label>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="min-h-screen flex items-center justify-center px-4 pt-16 pb-24">
    <div class="w-full max-w-md mx-auto">

      <!-- 加载状态 -->
      <div id="loadingState" class="text-center text-gray-500">
        <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-2 text-indigo-500"></i>
        <p>正在加载题库…</p>
      </div>

      <!-- 错误状态 -->
      <div id="errorState" class="hidden text-center">
        <div class="bg-white rounded-2xl shadow-xl p-6">
          <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500 mb-3"></i>
          <p id="errorMsg" class="text-gray-700 mb-4">加载失败</p>
          <button id="retryBtn"
            class="w-full py-3 rounded-xl bg-indigo-600 text-white font-medium active:bg-indigo-700 transition-colors">
            重试
          </button>
        </div>
      </div>

      <!-- 卡片 -->
      <div id="cardWrap" class="hidden">
        <div id="card"
          class="card-press relative bg-white rounded-2xl shadow-xl p-6 min-h-[60vh] flex flex-col cursor-pointer select-none transition-shadow hover:shadow-2xl">

          <!-- 收藏按钮 -->
          <button id="favBtn"
            class="absolute top-3 right-3 w-10 h-10 flex items-center justify-center rounded-full text-xl text-gray-400 hover:text-yellow-500 active:scale-95 transition"
            aria-label="收藏">
            <i id="favIcon" class="fa-regular fa-star"></i>
          </button>

          <!-- 问题 -->
          <div id="questionBox" class="mt-2 mb-auto pr-10">
            <div id="categoryTag" class="inline-block text-xs font-medium text-indigo-600 bg-indigo-50 rounded-full px-3 py-1 mb-3 hidden"></div>
            <div class="text-xs font-semibold tracking-wider text-indigo-500 uppercase mb-2">问题</div>
            <div id="question" class="text-lg md:text-xl font-semibold text-gray-900 leading-relaxed break-words"></div>
          </div>

          <!-- 分割线 -->
          <div class="border-t border-dashed border-gray-200 my-4"></div>

          <!-- 答案 -->
          <div id="answerBox" class="answer-hidden">
            <div class="text-xs font-semibold tracking-wider text-emerald-600 uppercase mb-2">答案</div>
            <div id="answer" class="text-base md:text-lg text-gray-700 leading-relaxed break-words whitespace-pre-wrap"></div>
          </div>

          <!-- 显示答案按钮（仅当答案隐藏时提示） -->
          <div id="showAnswerHint" class="mt-4 text-center">
            <span class="inline-flex items-center gap-2 text-sm text-gray-400">
              <i class="fa-solid fa-hand-pointer"></i>
              点击卡片显示答案
            </span>
          </div>
        </div>

        <!-- 下一条按钮 -->
        <button id="nextBtn"
          class="mt-5 w-full py-4 rounded-2xl bg-indigo-600 text-white text-lg font-semibold shadow-lg shadow-indigo-200 active:bg-indigo-700 active:scale-[0.99] transition">
          <i class="fa-solid fa-shuffle mr-2"></i>下一条
        </button>

        <!-- 进度信息 -->
        <div id="counter" class="mt-3 text-center text-sm text-gray-500"></div>
      </div>
    </div>
  </main>

  <!-- Toast 提示 -->
  <div id="toast"
    class="fixed left-1/2 top-20 -translate-x-1/2 hidden z-30 bg-gray-900/90 text-white text-sm px-4 py-2 rounded-full shadow-lg">
    提示
  </div>

  <script>
    // ============ 配置 ============
    const JSON_URL = 'https://raw.githubusercontent.com/lance-baba/my-learning-cards/refs/heads/main/db.json';
    const FAV_STORAGE_KEY = 'flashcard_favorites_v1';

    // ============ 状态 ============
    let allCards = [];      // 全部题目
    let favorites = new Set(); // 已收藏题目的 id（而非索引）
    let currentIndex = -1;
    let showAnswer = false;
    let onlyFavorites = false;
    let lastIndex = -1;     // 避免连续重复

    // 取一条题目的唯一 id（兼容带 id 字段的 db.json）
    const cardId = (item) => (item && item.id != null) ? item.id : item.question;

    // ============ DOM ============
    const $ = (id) => document.getElementById(id);
    const loadingState = $('loadingState');
    const errorState = $('errorState');
    const errorMsg = $('errorMsg');
    const retryBtn = $('retryBtn');
    const cardWrap = $('cardWrap');
    const card = $('card');
    const categoryTag = $('categoryTag');
    const question = $('question');
    const answer = $('answer');
    const answerBox = $('answerBox');
    const showAnswerHint = $('showAnswerHint');
    const nextBtn = $('nextBtn');
    const favBtn = $('favBtn');
    const favIcon = $('favIcon');
    const favToggle = $('favToggle');
    const counter = $('counter');
    const toast = $('toast');

    // ============ 工具函数 ============
    function showToast(text, duration = 1500) {
      toast.textContent = text;
      toast.classList.remove('hidden');
      toast.classList.add('toast-in');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => {
        toast.classList.add('hidden');
        toast.classList.remove('toast-in');
      }, duration);
    }

    function loadFavorites() {
      try {
        const raw = localStorage.getItem(FAV_STORAGE_KEY);
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr)) favorites = new Set(arr);
        }
      } catch (e) { /* ignore */ }
    }

    function saveFavorites() {
      try {
        localStorage.setItem(FAV_STORAGE_KEY, JSON.stringify([...favorites]));
      } catch (e) { /* ignore */ }
    }

    function getCandidates() {
      if (onlyFavorites) {
        // 返回所有已收藏题目的数组索引
        const indices = [];
        for (let i = 0; i < allCards.length; i++) {
          if (favorites.has(cardId(allCards[i]))) indices.push(i);
        }
        return indices;
      }
      return allCards.map((_, i) => i);
    }

    function pickNextIndex() {
      const candidates = getCandidates();
      if (candidates.length === 0) return -1;
      if (candidates.length === 1) return candidates[0];

      // 从候选中随机，避免与上一条相同
      let idx;
      let tries = 0;
      do {
        idx = candidates[Math.floor(Math.random() * candidates.length)];
        tries++;
      } while (idx === lastIndex && tries < 8);
      return idx;
    }

    function renderCard(animate = true) {
      const item = allCards[currentIndex];
      if (!item) return;

      const q = (typeof item.question === 'string') ? item.question
              : (item.q || item.title || '（无问题）');
      const a = (typeof item.answer === 'string') ? item.answer
              : (item.a || item.content || item.explanation || '（无答案）');
      const cat = item.category || null;
      const id = cardId(item);

      const applyContent = () => {
        // 分类标签
        if (cat) {
          categoryTag.textContent = cat;
          categoryTag.classList.remove('hidden');
        } else {
          categoryTag.classList.add('hidden');
        }

        question.textContent = q;
        answer.textContent = a;

        // 重置答案显示状态为隐藏
        showAnswer = false;
        answerBox.classList.remove('answer-shown');
        answerBox.classList.add('answer-hidden');
        showAnswerHint.classList.remove('hidden');

        // 收藏图标（基于 id）
        if (favorites.has(id)) {
          favIcon.classList.remove('fa-regular');
          favIcon.classList.add('fa-solid', 'text-yellow-500');
        } else {
          favIcon.classList.remove('fa-solid', 'text-yellow-500');
          favIcon.classList.add('fa-regular');
        }

        // 计数
        const total = onlyFavorites ? getCandidates().length : allCards.length;
        const order = onlyFavorites
          ? (getCandidates().indexOf(currentIndex) + 1)
          : (currentIndex + 1);
        counter.textContent = `${order} / ${total}${onlyFavorites ? '（收藏）' : ''}`;
      };

      if (animate) {
        card.classList.add('fade-enter');
        card.classList.remove('fade-active');
        requestAnimationFrame(() => {
          applyContent();
          requestAnimationFrame(() => {
            card.classList.add('fade-active');
            card.classList.remove('fade-enter');
          });
        });
      } else {
        applyContent();
      }
    }

    function toggleAnswer() {
      showAnswer = !showAnswer;
      if (showAnswer) {
        answerBox.classList.remove('answer-hidden');
        answerBox.classList.add('answer-shown');
        showAnswerHint.classList.add('hidden');
      } else {
        answerBox.classList.remove('answer-shown');
        answerBox.classList.add('answer-hidden');
        showAnswerHint.classList.remove('hidden');
      }
    }

    function toggleFavorite() {
      if (currentIndex < 0) return;
      const item = allCards[currentIndex];
      const id = cardId(item);
      if (favorites.has(id)) {
        favorites.delete(id);
        favIcon.classList.remove('fa-solid', 'text-yellow-500');
        favIcon.classList.add('fa-regular');
        showToast('已取消收藏');
      } else {
        favorites.add(id);
        favIcon.classList.remove('fa-regular');
        favIcon.classList.add('fa-solid', 'text-yellow-500');
        showToast('已收藏');
      }
      saveFavorites();

      // 如果在"只看收藏"模式下取消了当前项，且收藏为空，则提示
      if (onlyFavorites && getCandidates().length === 0) {
        showToast('收藏夹已空，请关闭"只看收藏"');
      }
    }

    function nextCard() {
      const candidates = getCandidates();
      if (candidates.length === 0) {
        if (onlyFavorites) {
          showToast('收藏夹为空，先收藏一些卡片吧', 2200);
        } else {
          showToast('暂无题目');
        }
        return;
      }
      lastIndex = currentIndex;
      currentIndex = pickNextIndex();
      renderCard(true);
    }

    // ============ 数据加载 ============
    function hideAllStates() {
      loadingState.classList.add('hidden');
      errorState.classList.add('hidden');
      cardWrap.classList.add('hidden');
    }

    function showCardUI() {
      hideAllStates();
      cardWrap.classList.remove('hidden');
    }

    function showError(msg) {
      hideAllStates();
      errorMsg.textContent = msg;
      errorState.classList.remove('hidden');
    }

    function showLoading() {
      hideAllStates();
      loadingState.classList.remove('hidden');
    }

    function normalizeData(data) {
      // 兼容多种结构： [item] 或 { cards: [...] } 或 { data: [...] }
      if (Array.isArray(data)) return data;
      if (data && Array.isArray(data.cards)) return data.cards;
      if (data && Array.isArray(data.data)) return data.data;
      if (data && Array.isArray(data.items)) return data.items;
      return [];
    }

    async function loadCards() {
      showLoading();
      try {
        const res = await fetch(JSON_URL, { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const list = normalizeData(data);
        if (!list.length) throw new Error('题库为空或格式不正确');
        allCards = list;
        showCardUI();
        nextCard(); // 随机显示第一张
      } catch (err) {
        console.error(err);
        showError('加载失败：' + (err.message || '请检查 JSON 链接'));
      }
    }

    // ============ 事件绑定 ============
    card.addEventListener('click', (e) => {
      // 点击收藏按钮时不切换答案
      if (e.target.closest('#favBtn')) return;
      toggleAnswer();
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      nextCard();
    });

    favBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFavorite();
    });

    favToggle.addEventListener('change', () => {
      onlyFavorites = favToggle.checked;
      if (onlyFavorites && getCandidates().length === 0) {
        showToast('收藏夹为空，先收藏一些卡片吧', 2200);
        return;
      }
      // 切换模式后立即随机一张
      lastIndex = -1;
      nextCard();
    });

    retryBtn.addEventListener('click', loadCards);

    // 支持键盘（桌面体验，不影响手机）
    document.addEventListener('keydown', (e) => {
      if (allCards.length === 0) return;
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault();
        if (e.key === ' ' && !showAnswer) {
          toggleAnswer();
        } else {
          nextCard();
        }
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFavorite();
      } else if (e.key === 'Enter') {
        nextCard();
      }
    });

    // ============ 启动 ============
    loadFavorites();
    loadCards();
  </script>
</body>
</html>
